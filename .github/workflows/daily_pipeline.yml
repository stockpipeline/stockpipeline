name: Daily Prompts

# 01단계(프롬프트 생성)만 담당한다.
# 이미지 생성은 Colab(colab/generate_images.ipynb, 사람이 실행)에서,
# 03~05단계는 postprocess_selected.yml에서,
# 06~07단계(업로드)는 upload_approved.yml에서 처리한다.

on:
  schedule:
    # 매일 한국시간(KST) 03:00 = UTC 18:00 (전날)
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      custom_topic:
        description: '즉석 주제 (한글/영문 모두 가능, 비워두면 평소처럼 자동 선택만 진행)'
        required: false
        type: string
      custom_topic_tag:
        description: '즉석 주제의 카테고리 (메타데이터/필터에 사용)'
        required: false
        type: choice
        default: 'other'
        options:
          - food
          - korean_culture
          - illustration
          - fantasy
          - abstract
          - other

permissions:
  contents: write

jobs:
  generate-prompts:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      CUSTOM_TOPIC: ${{ github.event.inputs.custom_topic }}
      CUSTOM_TOPIC_TAG: ${{ github.event.inputs.custom_topic_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Step 1 - Generate prompts
        run: python scripts/01_generate_prompts.py

      - name: Commit results
        if: always()
        run: |
          git config user.name "stock-pipeline-bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "chore: daily prompts $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase --autostash origin main
          git push origin main
