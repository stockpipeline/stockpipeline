name: Process Candidate Selection

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  process:
    if: contains(github.event.issue.labels.*.name, 'candidate-selection')
    runs-on: ubuntu-latest
    env:
      ISSUE_BODY: ${{ github.event.issue.body }}
      ISSUE_NUMBER: ${{ github.event.issue.number }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt --break-system-packages

      - name: Parse issue and write selections.json
        id: parse
        run: python scripts/parse_selection_issue.py

      - name: Commit selections.json
        if: success()
        run: |
          git config user.name "stock-pipeline-bot"
          git config user.email "actions@github.com"
          git add data/selections.json data/run_log.json
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "chore: candidate selections from issue #${ISSUE_NUMBER}"
          git pull --rebase --autostash origin main
          git push origin main

      - name: Comment and close issue (success)
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '✅ 선택 결과를 반영했습니다. "후처리 시작" 워크플로우를 실행해주세요.'
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });

      - name: Comment on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '❌ 선택 결과 처리 중 오류가 발생했습니다. Actions 로그를 확인해주세요.'
            });

  process_favorite:
    if: contains(github.event.issue.labels.*.name, 'favorite-add')
    runs-on: ubuntu-latest
    env:
      ISSUE_BODY: ${{ github.event.issue.body }}
      ISSUE_NUMBER: ${{ github.event.issue.number }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt --break-system-packages

      - name: Parse issue and update favorites.json
        run: python scripts/parse_favorite_issue.py

      - name: Commit favorites.json
        if: success()
        run: |
          git config user.name "stock-pipeline-bot"
          git config user.email "actions@github.com"
          git add data/favorites.json data/run_log.json
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "chore: add favorite from issue #${ISSUE_NUMBER}"
          git pull --rebase --autostash origin main
          git push origin main

      - name: Comment and close issue (success)
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '⭐ 즐겨찾기에 추가했습니다.'
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });

      - name: Comment on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '❌ 즐겨찾기 추가 중 오류가 발생했습니다. Actions 로그를 확인해주세요.'
            });
